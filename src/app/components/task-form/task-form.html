<!-- src/app/components/task-form/task-form.component.html -->

<!-- Add Task Button -->
<button
  (click)="toggleForm()"
  class="w-full py-3 px-4 rounded-xl border-2 border-dashed transition-all text-sm font-medium"
  [class]="
    isOpen
      ? 'border-indigo-300 bg-indigo-50 text-indigo-600'
      : 'border-gray-300 text-gray-500 hover:border-indigo-300 hover:text-indigo-500'
  "
>
  {{ isOpen ? "✕  Cancel" : "+  Add New Task" }}
</button>

<!-- Form Panel -->

@if(isOpen){
<div class="mt-3 bg-white border border-gray-200 rounded-xl p-5 shadow-sm">

  <!-- Title -->
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">
      Task Title *
    </label>
    <input
      [(ngModel)]="title"
      type="text"
      placeholder="What needs to be done?"
      class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm"
    />
  </div>

  <!-- Description -->
  <div class="mb-4">
    <label class="block text-sm font-medium text-gray-700 mb-1">
      Description
    </label>
    <textarea
      [(ngModel)]="description"
      rows="2"
      placeholder="Add some details..."
      class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm"
    ></textarea>
  </div>

  <!-- Priority -->
  <div class="mb-5">
    <label class="block text-sm font-medium text-gray-700 mb-2">
      Priority
    </label>
    <div class="flex gap-2">
        @for(p of priorityOptions; track p){
      <button
        (click)="setPriority(p)"
        class="flex-1 py-2 px-3 rounded-lg text-sm font-medium border transition-all"
        [class]="
          priority === p
            ? p === 'high'
              ? 'bg-red-50 border-red-300 text-red-700'
              : p === 'medium'
              ? 'bg-amber-50 border-amber-300 text-amber-700'
              : 'bg-green-50 border-green-300 text-green-700'
            : 'border-gray-200 text-gray-500 hover:border-gray-300'
        "
      >
        {{ p | titlecase }}
      </button>
    }
    </div>
  </div>

  <!-- Submit -->
  <button
    (click)="onSubmit()"
    [disabled]="!title.trim()"
    class="w-full py-2.5 px-4 rounded-lg bg-indigo-600 text-white text-sm font-medium
           hover:bg-indigo-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
  >
    Add Task
  </button>

</div>
}
