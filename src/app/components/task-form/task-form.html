<!-- Add Task Button -->
<button
  (click)="toggleForm()"
  class="w-full py-3 px-4 rounded-xl border-2 border-dashed transition-all text-sm font-medium
         border-gray-300 text-gray-500 hover:border-indigo-300 hover:text-indigo-500"
>
  +  Add New Task
</button>

<!-- Modal -->
@if (isOpen) {
  <div
    class="fixed inset-0 bg-black/50 flex items-center justify-center z-50"
    (click)="toggleForm()"
  >
    <div
      class="bg-white rounded-xl p-6 max-w-md w-full mx-4 shadow-xl"
      (click)="$event.stopPropagation()"
    >
      <!-- Header -->
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-semibold text-gray-900">Add New Task</h2>
        <button
          (click)="toggleForm()"
          class="text-gray-400 hover:text-gray-600 transition-colors"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <!-- Title -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Task Title *
        </label>
        <input
          #titleInput
          [(ngModel)]="title"
          (keydown)="onTitleKeydown($event)"
          type="text"
          placeholder="What needs to be done?"
          [class]="'w-full rounded-lg shadow-sm text-sm p-2 '
            + (title.trim() && isDuplicate()
              ? 'border-red-500 focus:border-red-500 focus:ring-red-500'
              : 'border-gray-300 focus:border-indigo-500 focus:ring-indigo-500')"
        />
        @if (title.trim() && isDuplicate()) {
          <p class="text-xs text-red-500 mt-1">This task already exists</p>
        }
      </div>

      <!-- Description -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Description
        </label>
        <textarea
          [(ngModel)]="description"
          rows="2"
          placeholder="Add some details..."
          class="w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 text-sm max-h-32 resize-y p-2 min-h-10"
        ></textarea>
      </div>

      <!-- Priority -->
      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          Priority
        </label>
        <div class="flex gap-2">
          @for (p of priorityOptions; track p) {
            <button
              (click)="setPriority(p)"
              class="flex-1 py-2 px-3 rounded-lg text-sm font-medium border transition-all"
              [class]="priority === p
                ? p === 'high'
                  ? 'bg-red-50 border-red-300 text-red-700'
                  : p === 'medium'
                  ? 'bg-amber-50 border-amber-300 text-amber-700'
                  : 'bg-green-50 border-green-300 text-green-700'
                : 'border-gray-200 text-gray-500 hover:border-gray-300'"
            >
              {{ p | titlecase }}
            </button>
          }
        </div>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3">
        <button
          (click)="toggleForm()"
          class="flex-1 py-2.5 px-4 rounded-lg border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
        >
          Cancel
        </button>
        <button
          (click)="onSubmit()"
          [disabled]="!title.trim() || isDuplicate()"
          class="flex-1 py-2.5 px-4 rounded-lg bg-indigo-600 text-white text-sm font-medium
                 hover:bg-indigo-700 transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
        >
          Add Task
        </button>
      </div>
    </div>
  </div>
}
